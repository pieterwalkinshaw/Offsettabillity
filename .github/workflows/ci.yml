name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: TypeScript typecheck (app)
        run: npx tsc --noEmit

      - name: TypeScript typecheck (functions)
        run: npm run typecheck
        working-directory: functions

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions
